name: Deploy Flask to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Python on runner (optional)
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Copy code to EC2
      uses: appleboy/scp-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: "."
        target: "/home/ec2-user/lnproj/lnproj-basic1/"
        rm: true
        strip_components: 1

    - name: Restart Flask service on EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          sudo systemctl daemon-reload
          sudo systemctl restart flaskapp
          sudo systemctl status flaskapp --no-pager
