name: Deploy Flask to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Python (optional if needed on runner)
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Copy code to EC2
      uses: appleboy/scp-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: "."
        target: "/home/ec2-user/lnproj/lnproj-basic1/"
        rm: true
        strip_components: 1

    - name: Start Flask app on EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          cd /home/ec2-user/lnproj/lnproj-basic1/
          # Kill previous Flask process if exists
          pkill -f app.py || echo "No previous app running"
          # Start Flask in background detached from terminal
          setsid python3 app.py > app.log 2>&1 < /dev/null &
          echo "Flask app started successfully"

    - name: Verify Flask app is running
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          if pgrep -f app.py > /dev/null; then
            echo "Flask app is running ✅"
          else
            echo "Flask app is NOT running ❌"
            exit 1
          fi
